_format_version: "3.0"

# User/Profile service — mỗi service 1 file.
services:
  - name: user-service
    url: http://user-service:3002
    routes:
      # Route cần JWT hợp lệ: /me (xem + sửa profile của chính mình).
      - name: user-protected
        strip_path: false
        paths:
          - /api/users/me
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
          # Decode claim sub/role -> set header X-User-Id / X-User-Role cho upstream
          - name: post-function
            config:
              access:
                - |
                  local auth = kong.request.get_header("Authorization")
                  if auth then
                    local token = string.match(auth, "Bearer%s+(.+)")
                    if token then
                      local parts = {}
                      for p in string.gmatch(token, "[^%.]+") do
                        parts[#parts + 1] = p
                      end
                      if #parts >= 2 then
                        local b64 = string.gsub(parts[2], "-", "+")
                        b64 = string.gsub(b64, "_", "/")
                        local rem = #b64 % 4
                        if rem > 0 then
                          b64 = b64 .. string.rep("=", 4 - rem)
                        end
                        local decoded = ngx.decode_base64(b64)
                        if decoded then
                          local ok, claims = pcall(function()
                            return require("cjson").decode(decoded)
                          end)
                          if ok and claims then
                            if claims.sub then
                              kong.service.request.set_header("X-User-Id", claims.sub)
                            end
                            if claims.role then
                              kong.service.request.set_header("X-User-Role", claims.role)
                            end
                          end
                        end
                      end
                    end
                  end

      # Route công khai: xem profile public của user khác (GET /api/users/{uuid}).
      # Regex chỉ khớp UUID -> KHÔNG nuốt /api/users/me (đó là route protected).
      - name: user-public
        strip_path: false
        paths:
          - "~/api/users/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
        methods:
          - GET
          - OPTIONS
