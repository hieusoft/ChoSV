_format_version: "3.0"

# Auth service — mỗi service 1 file. Thêm service mới = thêm file trong
# thư mục này, không đụng các file khác.
services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      # Route công khai — KHÔNG cần JWT
      # Gồm: đăng ký/đăng nhập, verify email, reset password, và bước 2 của
      # 2FA (dùng challenge_token nội bộ, không phải JWT của Kong).
      - name: auth-public
        strip_path: false
        paths:
          - /api/auth/register
          - /api/auth/login
          - /api/auth/refresh-token
          - /api/auth/verify-email
          - /api/auth/resend-verification
          - /api/auth/forgot-password
          - /api/auth/reset-password
          - /api/auth/2fa/verify
        methods:
          - POST
          - OPTIONS

      # Route cần JWT hợp lệ. Thêm middleware cho riêng nhóm route này
      # bằng cách thêm block vào `plugins` dưới đây.
      # Gồm: /me, logout, đổi mật khẩu, và quản lý 2FA (setup/enable/disable).
      - name: auth-protected
        strip_path: false
        paths:
          - /api/auth/me
          - /api/auth/logout
          - /api/auth/change-password
          - /api/auth/2fa/setup
          - /api/auth/2fa/enable
          - /api/auth/2fa/disable
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
          # Decode claim sub/role -> set header X-User-Id / X-User-Role cho upstream
          - name: post-function
            config:
              access:
                - |
                  local auth = kong.request.get_header("Authorization")
                  if auth then
                    local token = string.match(auth, "Bearer%s+(.+)")
                    if token then
                      local parts = {}
                      for p in string.gmatch(token, "[^%.]+") do
                        parts[#parts + 1] = p
                      end
                      if #parts >= 2 then
                        local b64 = string.gsub(parts[2], "-", "+")
                        b64 = string.gsub(b64, "_", "/")
                        local rem = #b64 % 4
                        if rem > 0 then
                          b64 = b64 .. string.rep("=", 4 - rem)
                        end
                        local decoded = ngx.decode_base64(b64)
                        if decoded then
                          local ok, claims = pcall(function()
                            return require("cjson").decode(decoded)
                          end)
                          if ok and claims then
                            if claims.sub then
                              kong.service.request.set_header("X-User-Id", claims.sub)
                            end
                            if claims.role then
                              kong.service.request.set_header("X-User-Role", claims.role)
                            end
                          end
                        end
                      end
                    end
                  end
