# ============================================
# docker-compose.services.yml
# Dev mode: chạy tất cả backend services
# Infrastructure (PG, Redis, RabbitMQ) chạy riêng từ docker-compose.yml
# ============================================

services:
  # ==========================================
  # API Gateway (Kong, DB-less)
  # Config declarative: ./gateway/kong/kong.yml
  # Proxy: 8080 (giữ nguyên cho Flutter app) | Admin API: 8001
  # ==========================================
  kong:
    image: kong:3.7
    container_name: hieusoft_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.rendered.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # post-function trong kong.yml dùng require("cjson") để decode JWT payload.
      # Kong sandbox Lua mặc định chặn require -> whitelist riêng cjson.
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: cjson
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./gateway/kong/kong.generated.yaml:/kong/kong.yml:ro
    # Thay placeholder __JWT_SECRET__ bằng env JWT_SECRET vào file tạm (writable)
    # trước khi Kong khởi động — secret thật không bao giờ nằm trong file config.
    # kong.generated.yaml sinh từ các file nhỏ bằng gateway/kong/build.sh.
    entrypoint:
      - bash
      - -c
      - |
        sed "s|__JWT_SECRET__|$$JWT_SECRET|g" /kong/kong.yml > /tmp/kong.rendered.yml
        exec /docker-entrypoint.sh kong docker-start
    ports:
      - "8080:8000"
      - "8001:8001"
    depends_on:
      - auth-service
    networks:
      - hieusoft_network

  # ==========================================
  # Auth Service (Node + Express + TS) ← SERVICE MẪU
  # ==========================================
  auth-service:
    build: ./services/auth
    container_name: hieusoft_auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      AUTH_PORT: 3001
      AUTH_DATABASE_URL: postgresql://hieusoft:hieusoft123@postgres:5432/auth_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      # Kong jwt plugin tra credential theo claim `iss` — phải khớp key trong kong.yml
      JWT_ISSUER: ${JWT_ISSUER:-auth-service}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      RABBITMQ_URL: amqp://hieusoft:hieusoft123@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hieusoft_network

  # ==========================================
  # User Service (Node + Express + TS)
  # Consumer đầu tiên: nghe user.registered từ auth -> tạo profile
  # ==========================================
  user-service:
    build: ./services/user
    container_name: hieusoft_user
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      USER_PORT: 3002
      USER_DATABASE_URL: postgresql://hieusoft:hieusoft123@postgres:5432/user_db?sslmode=disable
      RABBITMQ_URL: amqp://hieusoft:hieusoft123@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hieusoft_network

  # ==========================================
  # Upload Service (Node + Express + TS)
  # Cloudflare R2 presigned upload — trả upload_id để service khác gắn vào entity
  # ==========================================
  upload-service:
    build: ./services/upload
    container_name: hieusoft_upload
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      UPLOAD_PORT: 3010
      UPLOAD_DATABASE_URL: postgresql://hieusoft:hieusoft123@postgres:5432/upload_db?sslmode=disable
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      UPLOAD_MAX_FILE_SIZE_BYTES: ${UPLOAD_MAX_FILE_SIZE_BYTES:-5242880}
      UPLOAD_PRESIGN_EXPIRES_SECONDS: ${UPLOAD_PRESIGN_EXPIRES_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hieusoft_network

  # ==========================================
  # Product Service (Node + Express + TS)
  # Sản phẩm/danh mục/yêu thích. Ảnh dùng upload_id -> gọi upload-service save/unsave.
  # KHÔNG cần R2 creds (upload-service sở hữu R2).
  # ==========================================
  product-service:
    build: ./services/product
    container_name: hieusoft_product
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PRODUCT_PORT: 3003
      PRODUCT_DATABASE_URL: postgresql://hieusoft:hieusoft123@postgres:5432/product_db?sslmode=disable
      RABBITMQ_URL: amqp://hieusoft:hieusoft123@rabbitmq:5672/
      UPLOAD_SERVICE_URL: http://upload-service:3010
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hieusoft_network

  # ==========================================
  # Search Service (Node.js/Express TS) — TODO
  # ==========================================
  # search-service: ...

  # ==========================================
  # Chat Service (Go) — TODO
  # ==========================================
  # chat-service: ...

  # ==========================================
  # Notification Service (Node.js/Express TS) — TODO
  # ==========================================
  # notification-service: ...

  # ==========================================
  # AI Service (Python FastAPI)
  # Đọc ảnh + so khớp mô tả -> chấm rủi ro cho moderation. Prompt admin quản lý (versioned).
  # /analyze KHÔNG auth + tốn tiền mỗi call -> bind localhost thôi, moderation gọi qua docker net.
  # ==========================================
  ai-service:
    build: ./services/ai
    container_name: hieusoft_ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:3007:3007"
    environment:
      AI_PORT: 3007
      AI_API_KEY: ${AI_API_KEY}
      AI_API_BASE_URL: ${AI_API_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_REQUEST_TIMEOUT: ${AI_REQUEST_TIMEOUT:-90}
      AI_DATABASE_URL: postgresql://hieusoft:hieusoft123@postgres:5432/ai_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hieusoft_network

  # ==========================================
  # Moderation Service (Python FastAPI) — TODO
  # ==========================================
  # moderation-service: ...

  # ==========================================
  # Admin Service (Node.js/Express TS) — TODO
  # ==========================================
  # admin-service: ...

networks:
  hieusoft_network:
    external: true
